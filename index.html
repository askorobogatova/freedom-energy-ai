            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .slide {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            padding: 40px 60px 100px 60px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
            transform: translateY(20px);
            display: flex;
            flex-direction: column;

            opacity: 1;
            pointer-events: all;
            transform: translateY(0);

            margin-bottom: 20px;
            padding-bottom: 15px;

            margin-bottom: 50px;
            width: 100%;

            background: rgba(30, 41, 59, 0.8);
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            width: 190px;

            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);

            transform: translateY(-15px) scale(1.05);
            border-color: var(--accent);
            box-shadow: 0 15px 30px rgba(132, 204, 22, 0.2);
            background: rgba(30, 41, 59, 1);
        }
        .flow-icon {
            font-size: 36px;
            color: var(--accent);
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }
        .flow-step:hover .flow-icon {
            transform: scale(1.2);
        }
        .flow-title {
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
            font-family: 'Montserrat', sans-serif;
        }
        .flow-tool {
            color: var(--text-muted);
            font-size: 13px;
        }
        .flow-arrow {
            color: #475569;
            font-size: 24px;
            animation: pulseArrow 2s infinite;
        }
        @keyframes pulseArrow {
            0% { transform: translateX(0); opacity: 0.5; }
            50% { transform: translateX(5px); opacity: 1; color: var(--accent); }
            100% { transform: translateX(0); opacity: 0.5; }
        }
        .flow-details {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #0f172a;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            width: max-content;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .flow-details::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 6px 6px 6px;
            border-style: solid;
            border-color: transparent transparent var(--accent) transparent;
        }

            opacity: 1;
            bottom: -45px;

        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        
        /* Progress Bar */
        #progress-bar { position: absolute; top: 0; left: 0; height: 4px; background: var(--accent); width: 0%; transition: width 0.3s ease; z-index: 20; }
    </style>
</head>

        let currentSlide = 0;

        function initApp() {
            const navContainer = document.getElementById('nav-container');
            const mainContainer = document.getElementById('main');
            
            slidesData.forEach((slide, index) => {
                const navItem = document.createElement('div');
                navItem.className = 'nav-item';
                navItem.innerHTML = "<i class='" + slide.icon + "'></i> " + slide.title;
                navItem.onclick = () => goToSlide(index);
                navContainer.appendChild(navItem);
                
                const slideEl = document.createElement('div');
                slideEl.className = 'slide';
                slideEl.id = 'slide-' + index;
                slideEl.innerHTML = slide.content;
                mainContainer.insertBefore(slideEl, document.querySelector('.controls'));
            });
            
            updateView();
        }

        function goToSlide(index) {
            currentSlide = index;
            updateView();
        }

        function nextSlide() {
            if(currentSlide < slidesData.length - 1) {
                currentSlide++;
                updateView();
            }
        }

        function prevSlide() {
            if(currentSlide > 0) {
                currentSlide--;
                updateView();
            }
        }

        function updateView() {
            const slides = document.querySelectorAll('.slide');
            const navItems = document.querySelectorAll('.nav-item');
            
            slides.forEach((s, i) => {
                if(i === currentSlide) s.classList.add('active');
                else s.classList.remove('active');
            });
            
            navItems.forEach((n, i) => {
                if(i === currentSlide) n.classList.add('active');
                else n.classList.remove('active');
            });
            
            document.getElementById('prevBtn').style.opacity = currentSlide === 0 ? '0.3' : '1';
            document.getElementById('prevBtn').style.pointerEvents = currentSlide === 0 ? 'none' : 'all';
            document.getElementById('nextBtn').style.opacity = currentSlide === slidesData.length - 1 ? '0.3' : '1';
            document.getElementById('nextBtn').style.pointerEvents = currentSlide === slidesData.length - 1 ? 'none' : 'all';
            
            const progress = ((currentSlide + 1) / slidesData.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
            if(e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevSlide();
        });

        window.onload = initApp;
    </script>
