<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freedom Energy - AI Sales Strategy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1E3A5F;
            --accent: #84cc16;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        h1, h2, h3, h4 {
            font-family: 'Montserrat', sans-serif;
        }
        
        /* Sidebar Navigation */
        #sidebar {
            width: 320px;
            background-color: var(--bg-card);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #334155;
            z-index: 10;
        }
        .brand {
            padding: 0 20px 20px;
            border-bottom: 1px solid #334155;
            margin-bottom: 20px;
        }
        .brand h2 { color: var(--accent); font-size: 20px; display: flex; align-items: center; gap: 10px; }
        .nav-items {
            flex: 1;
            overflow-y: auto;
        }
        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 15px;
        }
        .nav-item i { width: 20px; text-align: center; }
        .nav-item:hover { background-color: rgba(255,255,255,0.05); color: var(--text-main); }
        .nav-item.active {
            background-color: rgba(132, 204, 22, 0.1);
            color: var(--accent);
            border-right: 4px solid var(--accent);
        }
        
        /* Main Content Area */
        #main {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .slide {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            padding: 40px 60px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
            transform: translateY(20px);
            overflow-y: auto;
        }
        .slide.active {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }
        
        /* Typography & Components */
        .slide-title {
            font-size: 32px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #334155;
            color: #fff;
        }
        .content-block {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .content-block h3 { color: var(--accent); margin-bottom: 15px; font-size: 20px; }
        p { margin-bottom: 15px; line-height: 1.6; font-size: 16px; }
        ul { margin-left: 20px; margin-bottom: 15px; }
        li { margin-bottom: 10px; line-height: 1.5; font-size: 16px; }
        
        /* Grid Layouts */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        
        /* Controls */
        .controls {
            position: absolute;
            bottom: 30px;
            right: 40px;
            display: flex;
            gap: 15px;
            z-index: 20;
        }
        .btn {
            background: var(--bg-card);
            border: 1px solid #334155;
            color: #fff;
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
        }
        .btn:hover { background: var(--accent); border-color: var(--accent); }
        
        /* Specific Styles */
        .doc-image { max-width: 100%; border-radius: 8px; border: 1px solid #334155; margin: 0 auto; display: block; }
        
        .table-wrapper { overflow-x: auto; background: rgba(30, 41, 59, 0.5); border-radius: 12px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; font-size: 16px; }
        th { background-color: var(--primary); color: #fff; font-family: 'Montserrat', sans-serif; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: rgba(255,255,255,0.02); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        
        /* Intro Slide */
        .intro-slide { display: flex; flex-direction: column; justify-content: center; height: 100%; align-items: center; text-align: center; }
        .intro-slide h1 { font-size: 56px; color: var(--text-main); margin-bottom: 20px; }
        .intro-slide h1 span { color: var(--accent); }
        .intro-slide p { font-size: 24px; color: var(--text-muted); max-width: 800px; margin-bottom: 40px; }
        .intro-badge { background: rgba(132, 204, 22, 0.1); color: var(--accent); padding: 8px 16px; border-radius: 20px; border: 1px solid var(--accent); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        
        /* Progress Bar */
        #progress-bar { position: absolute; top: 0; left: 0; height: 4px; background: var(--accent); width: 0%; transition: width 0.3s ease; z-index: 20; }
    </style>
</head>

    <div id="progress-bar"></div>

        let currentSlide = 0;

        function initApp() {
            const navContainer = document.getElementById('nav-container');
            const mainContainer = document.getElementById('main');
            
            slidesData.forEach((slide, index) => {
                // Create Nav Item
                const navItem = document.createElement('div');
                navItem.className = 'nav-item';
                navItem.innerHTML = "<i class='" + slide.icon + "'></i> " + slide.title;
                navItem.onclick = () => goToSlide(index);
                navContainer.appendChild(navItem);
                
                // Create Slide
                const slideEl = document.createElement('div');
                slideEl.className = 'slide';
                slideEl.id = 'slide-' + index;
                slideEl.innerHTML = slide.content;
                // insert before controls
                mainContainer.insertBefore(slideEl, document.querySelector('.controls'));
            });
            
            updateView();
        }

        function goToSlide(index) {
            currentSlide = index;
            updateView();
        }

        function nextSlide() {
            if(currentSlide < slidesData.length - 1) {
                currentSlide++;
                updateView();
            }
        }

        function prevSlide() {
            if(currentSlide > 0) {
                currentSlide--;
                updateView();
            }
        }

        function updateView() {
            const slides = document.querySelectorAll('.slide');
            const navItems = document.querySelectorAll('.nav-item');
            
            slides.forEach((s, i) => {
                if(i === currentSlide) s.classList.add('active');
                else s.classList.remove('active');
            });
            
            navItems.forEach((n, i) => {
                if(i === currentSlide) n.classList.add('active');
                else n.classList.remove('active');
            });
            
            // update buttons state
            document.getElementById('prevBtn').style.opacity = currentSlide === 0 ? '0.3' : '1';
            document.getElementById('prevBtn').style.pointerEvents = currentSlide === 0 ? 'none' : 'all';
            document.getElementById('nextBtn').style.opacity = currentSlide === slidesData.length - 1 ? '0.3' : '1';
            document.getElementById('nextBtn').style.pointerEvents = currentSlide === slidesData.length - 1 ? 'none' : 'all';
            
            // update progress bar
            const progress = ((currentSlide + 1) / slidesData.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
        }

        // Handle keyboard navigation
        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
            if(e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevSlide();
        });

        window.onload = initApp;
    </script>
